name: Daily Check-in

on:
  schedule:
    # Random time between 22:30-23:50 CST (14:30-15:50 UTC)
    # CRON_HOUR and CRON_MINUTE are set as repository secrets during setup
    - cron: '${{ secrets.CRON_MINUTE }} ${{ secrets.CRON_HOUR }} * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual form submission)'
        type: boolean
        default: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run check-in script
        id: checkin
        timeout-minutes: 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENCRYPTED_COOKIES: ${{ secrets.ENCRYPTED_COOKIES }}
          AES_KEY: ${{ secrets.AES_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: npm run checkin

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-failure-${{ github.run_id }}
          path: |
            artifacts/
            playwright-report/
          retention-days: 7
